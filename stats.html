<!DOCTYPE html>

<meta charset="UTF-8">

<title>Русский — Stats</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Русский">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f3ee; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem; }
  .container { width: 100%; max-width: 620px; margin: 0 auto; }
  .back-btn { display: inline-block; font-size: 0.8rem; color: #888; text-decoration: none; margin-bottom: 1.25rem; }
  .back-btn:hover { color: #444; }
  h1 { font-size: 1.4rem; font-weight: bold; margin-bottom: 1.5rem; }

  /* Tool tabs */
  .tool-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .tool-tab { padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.82rem; font-family: Georgia, serif; border: 1px solid #ccc; background: #fff; cursor: pointer; color: #666; transition: all 0.15s; }
  .tool-tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .tool-tab.disabled { opacity: 0.4; cursor: default; }

  /* Summary buckets */
  .buckets { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .bucket { flex: 1; border-radius: 8px; padding: 0.6rem 0.5rem; text-align: center; }
  .bucket-count { font-size: 1.3rem; font-weight: bold; }
  .bucket-label { font-size: 0.68rem; margin-top: 2px; opacity: 0.85; }
  .bucket.mastered { background: #2d7a3a; color: #fff; }
  .bucket.getting-there { background: #c17f00; color: #fff; }
  .bucket.need-work { background: #b02020; color: #fff; }

  /* Sort controls */
  .sort-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
  .sort-label { font-size: 0.75rem; color: #888; }
  .sort-btn { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.78rem; font-family: Georgia, serif; border: 1px solid #ccc; background: #fff; cursor: pointer; color: #666; transition: all 0.15s; }
  .sort-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* Word list */
  .word-list { display: flex; flex-direction: column; gap: 6px; }

  .word-pill {
    display: inline-block;
    padding: 0.45rem 0.9rem;
    border-radius: 6px;
    font-size: 0.88rem;
    color: #fff;
    font-family: Georgia, serif;
    line-height: 1.3;
    width: 100%;
  }
  .word-pill.unseen {
    background: transparent;
    border: 1px dashed #bbb;
    color: #bbb;
    filter: none;
  }

  .unseen-section-label { font-size: 0.72rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin: 1rem 0 0.5rem; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .coming-soon { color: #aaa; font-size: 0.9rem; padding: 2rem 0; text-align: center; font-style: italic; }
</style>
</head>

<div class="container">
  <a class="back-btn" href="index.html">← Home</a>
  <h1>Stats</h1>

  <div class="tool-tabs">
    <button class="tool-tab active" onclick="showTab('quiz')">Vocabulary Quiz</button>

    <button class="tool-tab disabled">Reading</button>
  </div>

  <div class="tab-content active" id="tab-quiz">
    <div class="buckets">

      <div class="bucket need-work"><div class="bucket-count" id="count-work">0</div><div class="bucket-label">Need work</div></div>
    </div>

    <div class="sort-row">

      <button class="sort-btn" id="sort-asc" onclick="setSort('asc')">Worst → Best</button>
      <button class="sort-btn" id="sort-alpha" onclick="setSort('alpha')">A → Я</button>
    </div>

    <div class="word-list" id="word-list"></div>
  </div>

  <div class="tab-content" id="tab-conj">
    <p class="coming-soon">Coming soon</p>
  </div>

let sortDir = 'desc';

function scoreToColor(s) {
  // 0 = dark red, 2.5 = amber, 5 = green
  if (s <= 2.5) {
    const t = s / 2.5;
    const r = Math.round(139 + (193 - 139) * t);
    const g = Math.round(0 + (127 - 0) * t);
    const b = 0;
    return `rgb(${r},${g},${b})`;
  } else {
    const t = (s - 2.5) / 2.5;
    const r = Math.round(193 + (45 - 193) * t);
    const g = Math.round(127 + (122 - 127) * t);
    const b = Math.round(0 + (58 - 0) * t);
    return `rgb(${r},${g},${b})`;
  }
}

function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
  catch(e) { return {}; }
}

function render() {
  const scores = loadScores();
  let mastered = 0, getting = 0, work = 0;

  const seen = [], unseen = [];
  ALL_WORDS.forEach(w => {
    if (w.key in scores) {
      const s = scores[w.key];
      if (s === 5) mastered++;
      else if (s >= 3) getting++;
      else work++;
      seen.push({ ...w, score: s });
    } else {
      unseen.push(w);
    }
  });

  document.getElementById('count-mastered').textContent = mastered;
  document.getElementById('count-getting').textContent = getting;
  document.getElementById('count-work').textContent = work;

  seen.sort((a, b) => {
    if (sortDir === 'desc') return b.score - a.score;
    if (sortDir === 'asc') return a.score - b.score;
    // alpha: sort by display string using Russian locale
    return a.display.localeCompare(b.display, 'ru');
  });

  const list = document.getElementById('word-list');
  list.innerHTML = '';

  seen.forEach(w => {
    const pill = document.createElement('div');
    pill.className = 'word-pill';
    pill.style.background = scoreToColor(w.score);
    pill.textContent = w.display + '  —  ' + w.score + ' / 5';
    list.appendChild(pill);
  });

  if (unseen.length > 0) {
    const label = document.createElement('div');
    label.className = 'unseen-section-label';
    label.textContent = `Not yet seen (${unseen.length})`;
    list.appendChild(label);

    unseen.forEach(w => {
      const pill = document.createElement('div');
      pill.className = 'word-pill unseen';
      pill.textContent = w.display;
      list.appendChild(pill);
    });
  }
}

function setSort(dir) {
  sortDir = dir;
  document.getElementById('sort-desc').className = 'sort-btn' + (dir === 'desc' ? ' active' : '');
  document.getElementById('sort-asc').className = 'sort-btn' + (dir === 'asc' ? ' active' : '');
  document.getElementById('sort-alpha').className = 'sort-btn' + (dir === 'alpha' ? ' active' : '');
  render();
}

function showTab(tab) {
  document.querySelectorAll('.tool-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'quiz') || (i === 1 && tab === 'conj'));
  });
  document.getElementById('tab-quiz').className = 'tab-content' + (tab === 'quiz' ? ' active' : '');
  document.getElementById('tab-conj').className = 'tab-content' + (tab === 'conj' ? ' active' : '');
}

render();
</script>
