// ── PATRONYMIC FORMATION ─────────────────────────────────────────────────────
function malePatronymic(name) {
  const specials = {
    "Илья": "Ильич", "Кузьма": "Кузьмич", "Лука": "Лукич",
    "Никита": "Никитич", "Фома": "Фомич"
  };
  if (specials[name]) return specials[name];
  let stem = name;
  if (name.endsWith("ий")) stem = name.slice(0, -2) + "ьев";
  else if (name.endsWith("й")) stem = name.slice(0, -1) + "ев";
  else if (name.endsWith("ь")) stem = name.slice(0, -1) + "ев";
  else if (name.endsWith("а") || name.endsWith("я")) stem = name.slice(0, -1) + "ов";
  else stem = name + "ов";
  return stem + "ич";
}

function femalePatronymic(name) {
  const specials = {
    "Илья": "Ильинична", "Кузьма": "Кузьминична", "Лука": "Лукинична",
    "Никита": "Никитична", "Фома": "Фоминична"
  };
  if (specials[name]) return specials[name];
  let stem = name;
  if (name.endsWith("ий")) stem = name.slice(0, -2) + "ьев";
  else if (name.endsWith("й")) stem = name.slice(0, -1) + "ев";
  else if (name.endsWith("ь")) stem = name.slice(0, -1) + "ев";
  else if (name.endsWith("а") || name.endsWith("я")) stem = name.slice(0, -1) + "ов";
  else stem = name + "ов";
  return stem + "на";
}

FAMOUS.forEach(q => QUESTIONS.push(q));

// ── SCORING ──────────────────────────────────────────────────────────────────

function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveScores(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e) {}
}
function updateScore(key, correct) {
  const s = loadScores();
  const cur = key in s ? s[key] : 0;
  s[key] = Math.max(0, Math.min(5, cur + (correct ? 1 : -1)));
  saveScores(s);
}

function weightedPick(n) {
  const scores = loadScores();
  const weighted = [];
  QUESTIONS.forEach(q => {
    const s = q.key in scores ? scores[q.key] : 0;
    const w = Math.round(6 - (s / 5) * 5);
    for (let i = 0; i < w; i++) weighted.push(q);
  });
  const picked = [], seen = new Set();
  for (const q of shuffle(weighted)) {
    if (!seen.has(q.key)) { seen.add(q.key); picked.push(q); if (picked.length === n) break; }
  }
  if (picked.length < n) {
    for (const q of shuffle(QUESTIONS)) {
      if (!seen.has(q.key)) { seen.add(q.key); picked.push(q); if (picked.length === n) break; }
    }
  }
  return picked;
}

// ── SESSION ───────────────────────────────────────────────────────────────────
let session = [], idx = 0, correct = 0, answered = false;

function startSession() {
  session = weightedPick(SESSION_SIZE);
  idx = 0; correct = 0;
  document.getElementById('results-box').style.display = 'none';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = session[idx];
  document.getElementById('q-counter').textContent = `Question ${idx + 1} of ${SESSION_SIZE}`;
  document.getElementById('score-display').textContent = idx > 0 ? `${correct} / ${idx} correct` : '';
  document.getElementById('progress-fill').style.width = `${(idx / SESSION_SIZE) * 100}%`;
  document.getElementById('q-type').textContent = q.type;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-context').textContent = q.context;
  document.getElementById('fact-box').className = 'fact-box';
  document.getElementById('next-btn').className = 'next-btn';

  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  shuffle(q.opts).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(opt, q);
    optEl.appendChild(btn);
  });
}

function handleAnswer(chosen, q) {
  if (answered) return;
  answered = true;
  updateScore(q.key, chosen === q.a);
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.a) b.classList.add(chosen === q.a ? 'correct' : 'revealed');
    else if (b.textContent === chosen && chosen !== q.a) b.classList.add('wrong');
  });
  if (chosen === q.a) correct++;
  if (q.fact) {
    const fb = document.getElementById('fact-box');
    fb.textContent = q.fact;
    fb.className = 'fact-box visible';
  }
  document.getElementById('next-btn').className = 'next-btn visible';
}

function nextQuestion() {
  idx++;
  if (idx >= SESSION_SIZE) showResults();
  else loadQuestion();
}

function showResults() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('q-counter').textContent = 'Session complete';
  document.getElementById('score-display').textContent = `${correct} / ${SESSION_SIZE} correct`;
  document.getElementById('options').innerHTML = '';
  document.getElementById('fact-box').className = 'fact-box';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('q-type').textContent = '';
  document.getElementById('q-text').textContent = '';
  document.getElementById('q-context').textContent = '';
  const rb = document.getElementById('results-box');
  document.getElementById('results-score').textContent = `${correct} / ${SESSION_SIZE}`;
  const pct = Math.round((correct / SESSION_SIZE) * 100);
  document.getElementById('results-label').textContent =
    pct === 100 ? 'Perfect! 🎉' : pct >= 60 ? 'Good effort!' : 'Keep practising!';
  rb.style.display = 'block';
}

startSession();
