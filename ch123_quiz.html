<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Russian Quiz — Sections 1–3</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="theme-color" content="#f5f3ee">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: #f5f3ee;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { width: 100%; max-width: 620px; }
  h1 { font-size: 1.4rem; font-weight: normal; margin-bottom: 0.25rem; color: #1a1a1a; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 2rem; }
  .progress-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; margin-bottom: 0.4rem; }
  .progress-track { height: 4px; background: #ddd; border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: #3a6ea8; border-radius: 2px; transition: width 0.3s; width: 0%; }
  .question-card { background: #fff; border: 1px solid #e0ddd6; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
  .category-badge { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: #e8e4db; color: #666; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .question-text { font-size: 1.5rem; font-weight: normal; line-height: 1.3; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .option-btn { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 0.65rem 0.85rem; font-size: 0.9rem; font-family: Georgia, serif; text-align: left; cursor: pointer; transition: background 0.15s, border-color 0.15s; line-height: 1.3; }
  .option-btn:hover:not(:disabled) { background: #f0ede6; border-color: #bbb; }
  .option-btn.correct { background: #e8f5e9; border-color: #81c784; color: #2e7d32; }
  .option-btn.wrong { background: #ffebee; border-color: #e57373; color: #c62828; }
  .feedback { display: none; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 0.6rem; }
  .feedback.correct { background: #e8f5e9; border: 1px solid #81c784; color: #2e7d32; }
  .feedback.wrong { background: #ffebee; border: 1px solid #e57373; color: #c62828; }
  .info-box { display: none; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; background: #f0ede6; border: 1px solid #d5cfc5; color: #444; line-height: 1.6; }
  .info-box .info-row { margin-bottom: 0.2rem; }
  .info-box .info-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.1rem; }
  .next-row { display: flex; justify-content: flex-end; }
  .next-btn { display: none; background: #fff; border: 1px solid #bbb; border-radius: 8px; padding: 0.5rem 1.25rem; font-size: 0.9rem; font-family: Georgia, serif; cursor: pointer; transition: background 0.15s; }
  .next-btn:hover { background: #f0ede6; }
  .results { display: none; text-align: center; padding: 3rem 0 2rem; }
  .results-score { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .results-msg { font-size: 1rem; color: #666; margin-bottom: 2rem; }
  .restart-btn { background: #3a6ea8; color: #fff; border: none; border-radius: 8px; padding: 0.65rem 1.75rem; font-size: 0.95rem; font-family: Georgia, serif; cursor: pointer; transition: background 0.15s; }
  .restart-btn:hover { background: #2d5a8a; }
</style>
</head>
<body>
<div class="container">
  <h1>Russian Quiz</h1>
  <p class="subtitle">Sections 1–3 — 20 random questions from a bank of 200</p>
  <div id="quiz-header">
    <div class="progress-row">
      <span id="progress-label">Question 1 of 20</span>
      <span id="score-label">0 / 20</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
  </div>
  <div class="question-card" id="question-card">
    <div class="category-badge" id="question-type"></div>
    <div class="question-text" id="question-text"></div>
  </div>
  <div class="options-grid" id="options-grid"></div>
  <div class="feedback" id="feedback"></div>
  <div class="info-box" id="info-box"></div>
  <div class="next-row"><button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button></div>
  <div class="results" id="results">
    <div class="results-score" id="final-score"></div>
    <div class="results-msg" id="final-message"></div>
    <button class="restart-btn" onclick="restartQuiz()">New set of 20</button>
  </div>
</div>
<script>
// Each question has: type, q, a, opts, pron (pronunciation, if Cyrillic), tr (translation if not already given), ex (3 example sentences)
const ALL_QUESTIONS = [
  // ── TRANSLATE TO ENGLISH ─────────────────────────────────────────────────
  {type:"Translate to English",q:"да",a:"yes",opts:["yes","no","hello","goodbye"],pron:"da",ex:["— Вы говорите по-русски? — Да! (Do you speak Russian? — Yes!)","— Это чай? — Да, это чай. (Is this tea? — Yes, it's tea.)","Да, я знаю. (Yes, I know.)"]},
  {type:"Translate to English",q:"нет",a:"no",opts:["yes","no","thank you","excuse me"],pron:"nyet",ex:["— Это водка? — Нет, это вино. (Is this vodka? — No, it's wine.)","Нет, я не понимаю. (No, I don't understand.)","— Вы едете в Москву? — Нет. (Are you going to Moscow? — No.)"]},
  {type:"Translate to English",q:"спасибо",a:"thank you",opts:["hello","goodbye","thank you","please"],pron:"spa-see-ba",ex:["— Три, пожалуйста. — Пожалуйста. — Спасибо! (Three, please. — Here you are. — Thank you!)","Спасибо за чай. (Thank you for the tea.)","Большое спасибо! (Thank you very much!)"]},
  {type:"Translate to English",q:"пожалуйста",a:"please / you're welcome",opts:["please / you're welcome","excuse me","goodbye","good morning"],pron:"pa-zhal-sta",ex:["Три, пожалуйста. (Three, please.)","— Спасибо! — Пожалуйста. (Thank you! — You're welcome.)","Простите, пожалуйста, где туалет? (Excuse me please, where is the toilet?)"]},
  {type:"Translate to English",q:"простите",a:"excuse me / I'm sorry",opts:["hello","excuse me / I'm sorry","thank you","where?"],pron:"pra-stee-tye",ex:["Простите, что это? (Excuse me, what is this?)","Простите, как вас зовут? (Excuse me, what is your name?)","Простите, пожалуйста, где касса? (Excuse me please, where is the ticket desk?)"]},
  {type:"Translate to English",q:"привет",a:"hello (informal)",opts:["goodbye","hello (informal)","good morning","hello (formal)"],pron:"pree-vet",ex:["Привет, Ваня! (Hello, Vanya!)","— Привет! — Привет! (Hello! — Hello!)","Привет, как дела? (Hi, how are you?)"]},
  {type:"Translate to English",q:"до свидания",a:"goodbye",opts:["good morning","good day","goodbye","you're welcome"],pron:"da svee-da-nee-ya",ex:["Спасибо. До свидания! (Thank you. Goodbye!)","— До свидания! — До свидания! (Goodbye! — Goodbye!)","До свидания, Мэри. (Goodbye, Mary.)"]},
  {type:"Translate to English",q:"доброе утро",a:"good morning",opts:["good morning","good day","good evening","goodbye"],pron:"do-bra-ye oo-tra",ex:["Доброе утро, Наташа! (Good morning, Natasha!)","— Доброе утро! — Доброе утро! (Good morning! — Good morning!)","Доброе утро. Чай? (Good morning. Tea?)"]},
  {type:"Translate to English",q:"добрый день",a:"good day",opts:["good morning","good day","goodbye","good evening"],pron:"do-bri dyen",ex:["Добрый день, меня зовут Борис. (Good day, my name is Boris.)","— Добрый день! — Добрый день! (Good day! — Good day!)","Добрый день. Простите, где ресторан? (Good day. Excuse me, where is the restaurant?)"]},
  {type:"Translate to English",q:"это",a:"this / that / it",opts:["he","she","this / that / it","where"],pron:"e-ta",ex:["Что это? Это чай. (What is this? It's tea.)","Это борщ. (This is beetroot soup.)","Простите, это вино? (Excuse me, is this wine?)"]},
  {type:"Translate to English",q:"вот",a:"here / there (pointing)",opts:["what?","where?","here / there (pointing)","and / but"],pron:"vot",ex:["Где Ваня? Вот он! (Where is Vanya? Here he is!)","Где водка? Вот она. (Where is the vodka? There it is.)","Вот меню. (Here is the menu.)"]},
  {type:"Translate to English",q:"где?",a:"where?",opts:["what?","where?","who?","when?"],pron:"(g)dye",ex:["Где туалет? (Where is the toilet?)","Где вы живёте? (Where do you live?)","Где Мэри? Вот она. (Where is Mary? There she is.)"]},
  {type:"Translate to English",q:"что?",a:"what?",opts:["what?","where?","who?","how?"],pron:"shto",ex:["Что это? (What is this?)","Простите, что это? (Excuse me, what is this?)","Что вы говорите? (What are you saying?)"]},
  {type:"Translate to English",q:"без проблем",a:"no problem",opts:["no problem","excuse me","you're welcome","goodbye"],pron:"bez pro-blem",ex:["— Простите! — Без проблем. (Excuse me! — No problem.)","Без проблем, я понимаю. (No problem, I understand.)","— Спасибо! — Без проблем! (Thank you! — No problem!)"]},
  {type:"Translate to English",q:"здравствуйте",a:"hello (formal)",opts:["hello (formal)","hello (informal)","goodbye","good morning"],pron:"zdra-stvooy-tye",ex:["Здравствуйте, меня зовут Мэри. (Hello, my name is Mary.)","Здравствуйте! Вы говорите по-английски? (Hello! Do you speak English?)","Здравствуйте, простите, где гостиница? (Hello, excuse me, where is the hotel?)"]},
  {type:"Translate to English",q:"а",a:"and / but (contrast)",opts:["and / but (contrast)","yes","no","this"],pron:"a",ex:["Я еду на автобусе, а Мэри едет на метро. (I go by bus, but Mary goes by metro.)","Он говорит по-русски, а она — нет. (He speaks Russian, but she doesn't.)","Вы говорите по-английски? А по-французски? (Do you speak English? And French?)"]},
  {type:"Translate to English",q:"водка",a:"vodka",opts:["vodka","wine","beer","tea"],pron:"vod-ka",tr:"vodka (f)",ex:["Где водка? Вот она. (Where is the vodka? There it is.)","Это водка? Нет, это вино. (Is this vodka? No, it's wine.)","Три водки, пожалуйста. (Three vodkas, please.)"]},
  {type:"Translate to English",q:"вино",a:"wine",opts:["vodka","wine","beer","juice"],pron:"vee-no",tr:"wine (n)",ex:["Это вино? Да, это вино. (Is this wine? Yes, it's wine.)","Нет, это водка, а не вино. (No, this is vodka, not wine.)","Вино, пожалуйста. (Wine, please.)"]},
  {type:"Translate to English",q:"пиво",a:"beer",opts:["vodka","wine","beer","tea"],pron:"pee-va",tr:"beer (n)",ex:["Где пиво? Вот оно! (Where is the beer? There it is!)","Пиво, пожалуйста. (Beer, please.)","Это пиво? Да. (Is this beer? Yes.)"]},
  {type:"Translate to English",q:"чай",a:"tea",opts:["coffee","wine","beer","tea"],pron:"chay",tr:"tea (m)",ex:["Что это? Это чай. (What is this? It's tea.)","Чай, пожалуйста. (Tea, please.)","Три чая. (Three teas.)"]},
  {type:"Translate to English",q:"борщ",a:"beetroot soup",opts:["sour cream","beetroot soup","chocolate","bread"],pron:"borshch",tr:"beetroot soup (m)",ex:["Это борщ? Да. (Is this beetroot soup? Yes.)","Борщ со сметаной. (Beetroot soup with sour cream.)","Нет, это борщ, а не вино! (No, this is beetroot soup, not wine!)"]},
  {type:"Translate to English",q:"сметана",a:"sour cream",opts:["sour cream","beetroot soup","chocolate","butter"],pron:"smye-ta-na",tr:"sour cream (f)",ex:["Борщ со сметаной. (Beetroot soup with sour cream.)","Где сметана? (Where is the sour cream?)","Это сметана. (This is sour cream.)"]},
  {type:"Translate to English",q:"шоколад",a:"chocolate",opts:["chocolate","sugar","cheese","bread"],pron:"sha-ka-lad",tr:"chocolate (m)",ex:["Что это? Это шоколад. (What is this? It's chocolate.)","Шоколад, пожалуйста. (Chocolate, please.)","Это шоколад? Да, это шоколад. (Is this chocolate? Yes, it's chocolate.)"]},
  {type:"Translate to English",q:"сахар",a:"sugar",opts:["sugar","salt","cheese","butter"],pron:"sa-khar",tr:"sugar (m)",ex:["Сахар, пожалуйста. (Sugar, please.)","Где сахар? (Where is the sugar?)","Чай с сахаром. (Tea with sugar.)"]},
  {type:"Translate to English",q:"газета",a:"newspaper",opts:["newspaper","magazine","book","letter"],pron:"ga-zye-ta",tr:"newspaper (f)",ex:["Что это? Это газета Правда. (What is this? It's the Pravda newspaper.)","Где газета? (Where is the newspaper?)","Это газета? Да. (Is this a newspaper? Yes.)"]},
  {type:"Translate to English",q:"журнал",a:"magazine / journal",opts:["newspaper","magazine / journal","book","letter"],pron:"zhoor-nal",tr:"magazine (m)",ex:["Это журнал? Да. (Is this a magazine? Yes.)","Где журнал? (Where is the magazine?)","Журнал, пожалуйста. (The magazine, please.)"]},
  {type:"Translate to English",q:"дом",a:"house",opts:["house","flat","window","door"],pron:"dom",tr:"house (m)",ex:["Это дом. (This is a house.)","Где дом? (Where is the house?)","Он живёт в этом доме. (He lives in this house.)"]},
  {type:"Translate to English",q:"окно",a:"window",opts:["house","flat","window","door"],pron:"ak-na",tr:"window (n)",ex:["Где окно? Вот оно. (Where is the window? There it is.)","Это окно. (This is a window.)","Окно открыто. (The window is open.)"]},
  {type:"Translate to English",q:"дверь",a:"door",opts:["house","flat","window","door"],pron:"dvyer",tr:"door (f)",ex:["Где дверь? Вот она. (Where is the door? There it is.)","ОТ СЕБЯ — push; К СЕБЕ — pull. (These signs are on doors.)","Это дверь. (This is a door.)"]},
  {type:"Translate to English",q:"брат",a:"brother",opts:["brother","sister","uncle","dad"],pron:"brat",tr:"brother (m)",ex:["Где брат? Вот он! (Where is the brother? Here he is!)","Это мой брат. (This is my brother.)","Брат говорит по-русски. (My brother speaks Russian.)"]},
  {type:"Translate to English",q:"сестра",a:"sister",opts:["brother","sister","uncle","mum"],pron:"sys-tra",tr:"sister (f)",ex:["Где сестра? Вот она! (Where is the sister? There she is!)","Это моя сестра. (This is my sister.)","Сестра живёт в Лондоне. (My sister lives in London.)"]},
  {type:"Translate to English",q:"мать",a:"mother",opts:["mother","father","sister","brother"],pron:"mat",tr:"mother (f)",ex:["Где мать? Вот она. (Where is mother? There she is.)","Это мать. (This is mother.)","Мать живёт в Москве. (Mother lives in Moscow.)"]},
  {type:"Translate to English",q:"папа",a:"dad",opts:["mum","dad","uncle","brother"],pron:"pa-pa",tr:"dad (m)",ex:["Где папа? Вот он! (Where is dad? Here he is!)","Это папа. (This is dad.)","Папа говорит по-английски. (Dad speaks English.)"]},
  {type:"Translate to English",q:"дядя",a:"uncle",opts:["uncle","aunt","brother","sister"],pron:"dya-dya",tr:"uncle (m)",ex:["Где дядя Ваня? Вот он! (Where is Uncle Vanya? Here he is!)","Это дядя. (This is my uncle.)","Дядя живёт в Москве. (Uncle lives in Moscow.)"]},
  {type:"Translate to English",q:"такси",a:"taxi",opts:["taxi","bus","train","metro"],pron:"tak-see",tr:"taxi (n, indeclinable)",ex:["Где такси? Вот оно! (Where is the taxi? There it is!)","Такси, пожалуйста. (A taxi, please.)","Это такси? Да. (Is this a taxi? Yes.)"]},
  {type:"Translate to English",q:"рубль",a:"rouble",opts:["rouble","euro","dollar","pound"],pron:"roob-ly",tr:"rouble (m)",ex:["Что это? Это рубль. (What is this? It's a rouble.)","Три рубля. (Three roubles.)","Рубль — это русская валюта. (The rouble is Russian currency.)"]},
  {type:"Translate to English",q:"утро",a:"morning",opts:["morning","evening","night","afternoon"],pron:"oo-tra",tr:"morning (n)",ex:["Доброе утро! (Good morning!)","Утро — это хорошо. (Morning is good.)","Доброе утро, Наташа! (Good morning, Natasha!)"]},
  {type:"Translate to English",q:"день",a:"day",opts:["day","night","morning","week"],pron:"dyen",tr:"day (m)",ex:["Добрый день! (Good day!)","Один день. (One day.)","Добрый день, меня зовут Борис. (Good day, my name is Boris.)"]},
  {type:"Translate to English",q:"Москва",a:"Moscow",opts:["Moscow","St Petersburg","Kiev","Minsk"],pron:"mask-va",tr:"Moscow (f)",ex:["Она живёт в Москве. (She lives in Moscow.)","Где Москва? В России. (Where is Moscow? In Russia.)","Я еду в Москву. (I am going to Moscow.)"]},
  {type:"Translate to English",q:"англичанин",a:"Englishman",opts:["Englishman","Englishwoman","Russian man","Russian woman"],pron:"an-glee-chan-in",tr:"Englishman (m)",ex:["Он англичанин. (He is an Englishman.)","Это англичанин? Да. (Is this an Englishman? Yes.)","Он англичанин и говорит по-английски. (He is an Englishman and speaks English.)"]},
  {type:"Translate to English",q:"англичанка",a:"Englishwoman",opts:["Englishwoman","Englishman","Russian woman","Russian man"],pron:"an-glee-chan-ka",tr:"Englishwoman (f)",ex:["Мэри — англичанка. (Mary is an Englishwoman.)","Она англичанка и говорит по-английски. (She is an Englishwoman and speaks English.)","Это англичанка? Да. (Is this an Englishwoman? Yes.)"]},
  {type:"Translate to English",q:"правда",a:"truth",opts:["truth","lie","news","word"],pron:"prav-da",tr:"truth (f) / also: a famous newspaper",ex:["Это правда? (Is that true?)","Правда — газета. (Pravda is a newspaper.)","Да, это правда. (Yes, that's true.)"]},
  {type:"Translate to English",q:"кофе",a:"coffee",opts:["coffee","tea","water","juice"],pron:"ko-fye",tr:"coffee (m — exception!)",ex:["Кофе, пожалуйста. (Coffee, please.)","Что это? Это кофе. (What is this? It's coffee.)","Кофе — мужского рода, хотя оканчивается на -е. (Coffee is masculine, even though it ends in -е.)"]},
  {type:"Translate to English",q:"меню",a:"menu",opts:["menu","taxi","show","jury"],pron:"mye-nyoo",tr:"menu (n, indeclinable)",ex:["Где меню? Вот оно. (Where is the menu? There it is.)","Меню, пожалуйста. (The menu, please.)","Это меню. (This is the menu.)"]},
  {type:"Translate to English",q:"пепси-кола",a:"Pepsi-Cola",opts:["Pepsi-Cola","Coca-Cola","lemonade","juice"],pron:"pep-see ko-la",tr:"Pepsi-Cola",ex:["А это? Пепси-Кола. (And this? Pepsi-Cola.)","Пепси-Кола, пожалуйста. (Pepsi-Cola, please.)","Это пепси-кола. (This is Pepsi-Cola.)"]},
  // ── WHAT GENDER? ────────────────────────────────────────────────────────
  {type:"What gender?",q:"водка",a:"feminine (она)",opts:["masculine (он)","feminine (она)","neuter (оно)"],pron:"vod-ka",tr:"vodka",ex:["Где водка? Вот она! (Where is the vodka? There it is!)","Водка — женского рода: она заканчивается на -а. (Vodka is feminine: it ends in -а.)","Это водка. Вот она. (This is vodka. Here it is.)"]},
  {type:"What gender?",q:"вино",a:"neuter (оно)",opts:["masculine (он)","feminine (она)","neuter (оно)"],pron:"vee-no",tr:"wine",ex:["Где вино? Вот оно! (Where is the wine? There it is!)","Вино — среднего рода: заканчивается на -о. (Wine is neuter: ends in -о.)","Это вино? Да. Вот оно. (Is this wine? Yes. Here it is.)"]},
  {type:"What gender?",q:"чай",a:"masculine (он)",opts:["masculine (он)","feminine (она)","neuter (оно)"],pron:"chay",tr:"tea",ex:["Где чай? Вот он! (Where is the tea? There it is!)","Чай — мужского рода: заканчивается на согласный й. (Tea is masculine: ends in the consonant й.)","Чай, пожалуйста. Вот он. (Tea, please. Here it is.)"]},

  {type:"Pronunciation",q:"Which is correct for Москва?",a:"mask-va",opts:["mask-va","mos-kva","mosk-va","mask-vo"],ex:["Безударное -о- в середине редуцируется до /а/. (Unstressed -о- in the middle reduces to /а/.)","Они в Москве. Произносится mask-va. (They are in Moscow. Pronounced mask-va.)","Москва — столица России. (Moscow is the capital of Russia.)"]},

  {type:"Pronunciation",q:"Which is correct for оно?",a:"a-no",opts:["a-no","o-no","on-o","an-o"],ex:["Первое о безударное → /а/; второе о ударное → /о/. (First о unstressed → /а/; second о stressed → /о/.)","Где такси? Вот оно. Произносится а-но. (Where's the taxi? There it is. Pronounced a-no.)","Меню — оно. Вот оно. (The menu is neuter — it. There it is.)"]},

  {type:"Pronunciation",q:"Which is correct for здравствуйте?",a:"zdra-stvooy-tye",opts:["zdra-stvooy-tye","zdra-vstvoo-ee-tye","zda-stvooy-tye","zdra-stvoo-tye"],ex:["Первая в почти никогда не произносится: здра-ствуй-те. (The first в is almost never pronounced: zdra-stvooy-tye.)","Здравствуйте, меня зовут Мэри. (Hello, my name is Mary.)","Здравствуйте! Вы говорите по-английски? (Hello! Do you speak English?)"]},
  {type:"Pronunciation",q:"Which is correct for что?",a:"shto",opts:["shto","chto","shcho","kto"],ex:["Ч в слове что произносится как ш: shto, а не chto. (The ч in что is pronounced like ш: shto, not chto.)","Что это? Произносится: shto e-ta? (What is this? Pronounced: shto e-ta?)","Что вы говорите? Произносится shto. (What are you saying? Pronounced shto.)"]},

  {type:"Pronunciation",q:"Which is correct for привет?",a:"pree-vet",opts:["pree-vet","pri-vyet","pree-vyet","pri-vet"],ex:["Ударение на втором слоге: при-ВЕТ. (Stress on the second syllable: pri-VET.)","Привет, Ваня! Произносится pree-vet. (Hello, Vanya! Pronounced pree-vet.)","Привет! Как дела? (Hi! How are you?)"]},

let current = 0, score = 0, answered = false, selected20 = [];
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz() {
  selected20 = shuffle(ALL_QUESTIONS).slice(0, 20);
  current = 0; score = 0; answered = false;
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz-header').style.display = 'block';
  document.getElementById('question-card').style.display = 'block';
  document.getElementById('options-grid').style.display = 'grid';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = selected20[current];
  document.getElementById('progress-label').textContent = `Question ${current + 1} of 20`;
  document.getElementById('score-label').textContent = `${score} / 20`;
  document.getElementById('progress-bar').style.width = `${(current / 20) * 100}%`;
  document.getElementById('question-type').textContent = q.type;
  const qtEl = document.getElementById('question-text');
  if (q.type === 'Read the handwriting') {
    qtEl.innerHTML = '<em style="font-size:1.8rem;">' + q.q + '</em>';
  } else {
    qtEl.textContent = q.q;
  }
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('info-box').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  shuffle(q.opts).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt, q.a);
    grid.appendChild(btn);
  });
}

function checkAnswer(selected, correct) {
  if (answered) return;
  answered = true;
  const q = selected20[current];
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === correct) btn.classList.add('correct');
    else if (btn.textContent === selected) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (selected === correct) {
    score++;
    fb.className = 'feedback correct';
    fb.textContent = '✓ Correct!';
  } else {
    fb.className = 'feedback wrong';
    fb.textContent = `✗ The answer is: ${correct}`;
  }
  document.getElementById('score-label').textContent = `${score} / 20`;

  // Build info box
  const infoBox = document.getElementById('info-box');
  let html = '';
  if (q.pron) {
    html += `<div class="info-label">Pronunciation</div><div class="info-row">${q.pron}</div>`;
  }
  if (q.tr) {
    html += `<div class="info-label" style="margin-top:0.5rem">Translation</div><div class="info-row">${q.tr}</div>`;
  }
  if (q.ex && q.ex.length > 0) {
    const example = q.ex[Math.floor(Math.random() * q.ex.length)];
    html += `<div class="info-label" style="margin-top:0.5rem">Example</div><div class="info-row">${example}</div>`;
  }
  if (html) {
    infoBox.innerHTML = html;
    infoBox.style.display = 'block';
  }

  document.getElementById('next-btn').style.display = 'inline-block';
}

function nextQuestion() {
  current++;
  if (current >= 20) showResults();
  else showQuestion();
}

function showResults() {
  document.getElementById('quiz-header').style.display = 'none';
  document.getElementById('question-card').style.display = 'none';
  document.getElementById('options-grid').style.display = 'none';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('info-box').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  const pct = Math.round((score / 20) * 100);
  document.getElementById('final-score').textContent = `${score} / 20 (${pct}%)`;
  const msgs = ['Review the vocabulary and try again — каждый день!','Keep practising — you\'re getting there!','Good work! Хорошо!','Excellent! Очень хорошо!'];
  document.getElementById('final-message').textContent = msgs[pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0];
  document.getElementById('results').style.display = 'block';
}

function restartQuiz() { startQuiz(); }
startQuiz();
</script>
