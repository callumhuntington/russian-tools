<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Русский — Reading</title>
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Русский">
<meta name="theme-color" content="#f5f3ee">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f3ee; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .container { width: 100%; max-width: 620px; margin: 0 auto; }

  .back-btn { display: inline-block; font-size: 0.8rem; color: #888; text-decoration: none; margin-bottom: 1.25rem; }
  .back-btn:hover { color: #444; }

  h1 { font-size: 1.4rem; font-weight: bold; margin-bottom: 0.25rem; }
  .passage-label { font-size: 0.78rem; color: #888; margin-bottom: 1.75rem; }

  /* Passage box */
  .passage-box {
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    padding: 1.25rem 1.4rem;
    margin-bottom: 1.75rem;
    line-height: 1.75;
  }
  .passage-title {
    font-size: 1rem;
    font-weight: bold;
    margin-bottom: 0.9rem;
    color: #1a1a1a;
  }
  .passage-intro {
    font-size: 0.82rem;
    color: #666;
    margin-bottom: 0.9rem;
    font-style: italic;
  }
  .dialogue-line { display: flex; gap: 0.6rem; margin-bottom: 0.35rem; align-items: baseline; }
  .speaker { font-weight: bold; min-width: 1.4rem; font-size: 0.95rem; }
  .line-text { font-size: 0.95rem; flex: 1; }
  .speak-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0 0.1rem;
    opacity: 0.4;
    transition: opacity 0.15s;
    flex-shrink: 0;
    align-self: center;
  }
  .speak-btn:hover { opacity: 0.8; }
  .speak-btn.speaking { opacity: 1; }

  /* Questions */
  .questions-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.07em; color: #888; margin-bottom: 1rem; }
  .question-block { margin-bottom: 1.5rem; }
  .question-text { font-size: 0.95rem; margin-bottom: 0.65rem; line-height: 1.4; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.9rem;
    font-family: Georgia, serif;
    text-align: left;
    cursor: pointer;
    color: #1a1a1a;
    transition: background 0.12s, border-color 0.12s;
    line-height: 1.3;
  }
  .opt-btn:hover:not(:disabled) { background: #f0ede6; border-color: #bbb; }
  .opt-btn.correct { background: #e6f4ea; border-color: #4caf50; color: #1a4a1e; }
  .opt-btn.wrong { background: #fdecea; border-color: #e57373; color: #5c1010; }
  .opt-btn.revealed { background: #e6f4ea; border-color: #4caf50; color: #1a4a1e; }
  .opt-btn:disabled { cursor: default; }

  /* Score / results */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: #888;
  }
  .score-display { font-size: 0.95rem; color: #1a1a1a; }

  .results-box {
    display: none;
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    padding: 1.5rem;
    text-align: center;

const QUESTIONS_PER_SESSION = 4;

// Shuffles an array in place (Fisher-Yates)
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Passage order: shuffled queue, refills when empty
let passageQueue = [];
let currentPassageIdx = 0;
let sessionQuestions = []; // the 4 picked questions for this round
let answered = [];
let correct = 0;

function getNextPassageIdx() {
  if (passageQueue.length === 0) {
    passageQueue = shuffle([...Array(PASSAGES.length).keys()]);
  }
  return passageQueue.shift();
}

function loadPassage() {
  const p = PASSAGES[currentPassageIdx];

  // Pick 4 random questions from the full bank
  const allQ = p.questions.map((q, i) => i);
  shuffle(allQ);
  sessionQuestions = allQ.slice(0, QUESTIONS_PER_SESSION);

  answered = new Array(QUESTIONS_PER_SESSION).fill(false);
  correct = 0;

  // Label
  document.getElementById('passage-label').textContent =
    `${p.title} — ${p.difficulty}`;

  // Passage box
  const box = document.getElementById('passage-box');
  let html = `<div class="passage-title">${p.title}</div>`;
  if (p.intro) html += `<div class="passage-intro">${p.intro}</div>`;
  for (const line of p.dialogue) {
    html += `<div class="dialogue-line">
      <span class="speaker">${line.speaker}:</span>
      <span class="line-text">${line.text}</span>
      <button class="speak-btn" onclick="speakLine(this, ${JSON.stringify(line.text)})" title="Listen">🔊</button>
    </div>`;
  }
  box.innerHTML = html;

  updateScore();

  // Render the 4 selected questions
  const area = document.getElementById('questions-area');
  area.innerHTML = '';
  sessionQuestions.forEach((qi, displayIdx) => {
    const q = p.questions[qi];
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q${displayIdx}`;

    const qtext = document.createElement('div');
    qtext.className = 'question-text';
    qtext.textContent = `${displayIdx + 1}. ${q.q}`;
    block.appendChild(qtext);

    const opts = document.createElement('div');
    opts.className = 'options';
    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = () => handleAnswer(displayIdx, oi);
      opts.appendChild(btn);
    });
    block.appendChild(opts);
    area.appendChild(block);
  });

  document.getElementById('results-box').style.display = 'none';
}

function handleAnswer(displayIdx, oi) {
  if (answered[displayIdx]) return;
  answered[displayIdx] = true;

  const p = PASSAGES[currentPassageIdx];
  const qi = sessionQuestions[displayIdx];
  const q = p.questions[qi];
  const block = document.getElementById(`q${displayIdx}`);
  const btns = block.querySelectorAll('.opt-btn');

  btns.forEach(b => b.disabled = true);

  if (oi === q.a) {
    btns[oi].classList.add('correct');
    correct++;
  } else {
    btns[oi].classList.add('wrong');
    btns[q.a].classList.add('revealed');
  }

  updateScore();

  if (answered.every(Boolean)) {
    setTimeout(showResults, 600);
  }
}

function updateScore() {
  const done = answered.filter(Boolean).length;
  document.getElementById('score-display').textContent =
    done > 0 ? `${correct} / ${done} correct` : '';
}

function showResults() {
  const box = document.getElementById('results-box');
  document.getElementById('results-score').textContent = `${correct} / ${QUESTIONS_PER_SESSION}`;
  const pct = Math.round((correct / QUESTIONS_PER_SESSION) * 100);
  let label = pct === 100 ? 'Perfect! 🎉' : pct >= 60 ? 'Good effort — review the answers above.' : 'Keep practising — the answers are highlighted above.';
  document.getElementById('results-label').textContent = label;
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextPassage() {
  currentPassageIdx = getNextPassageIdx();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  loadPassage();
}

function goHome() {
  window.location.href = 'index.html';
}

function speakLine(btn, text) {
  window.speechSynthesis.cancel();
  const allBtns = document.querySelectorAll('.speak-btn');
  allBtns.forEach(b => b.classList.remove('speaking'));

  function doSpeak() {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ru-RU';
    utter.rate = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const ruVoice = voices.find(v => v.lang.startsWith('ru'));
    if (ruVoice) utter.voice = ruVoice;
    btn.classList.add('speaking');
    utter.onend = () => btn.classList.remove('speaking');
    utter.onerror = () => btn.classList.remove('speaking');
    window.speechSynthesis.speak(utter);
  }

  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      doSpeak();
    };
    // Fallback: speak anyway after short delay even if voices don't load
    setTimeout(() => {
      if (!window.speechSynthesis.speaking) doSpeak();
    }, 300);
  }
}

// Start with a random passage
currentPassageIdx = getNextPassageIdx();
