<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Русский — Reading</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Русский">
<meta name="theme-color" content="#f5f3ee">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f3ee; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .container { width: 100%; max-width: 620px; margin: 0 auto; }

  .back-btn { display: inline-block; font-size: 0.8rem; color: #888; text-decoration: none; margin-bottom: 1.25rem; }
  .back-btn:hover { color: #444; }

  h1 { font-size: 1.4rem; font-weight: bold; margin-bottom: 0.25rem; }
  .passage-label { font-size: 0.78rem; color: #888; margin-bottom: 1.75rem; }

  /* Passage box */
  .passage-box {
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    padding: 1.25rem 1.4rem;
    margin-bottom: 1.75rem;
    line-height: 1.75;
  }
  .passage-title {
    font-size: 1rem;
    font-weight: bold;
    margin-bottom: 0.9rem;
    color: #1a1a1a;
  }
  .passage-intro {
    font-size: 0.82rem;
    color: #666;
    margin-bottom: 0.9rem;
    font-style: italic;
  }
  .dialogue-line { display: flex; gap: 0.6rem; margin-bottom: 0.35rem; align-items: baseline; }
  .speaker { font-weight: bold; min-width: 1.4rem; font-size: 0.95rem; }
  .line-text { font-size: 0.95rem; }

  /* Questions */
  .questions-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.07em; color: #888; margin-bottom: 1rem; }
  .question-block { margin-bottom: 1.5rem; }
  .question-text { font-size: 0.95rem; margin-bottom: 0.65rem; line-height: 1.4; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.9rem;
    font-family: Georgia, serif;
    text-align: left;
    cursor: pointer;
    color: #1a1a1a;
    transition: background 0.12s, border-color 0.12s;
    line-height: 1.3;
  }
  .opt-btn:hover:not(:disabled) { background: #f0ede6; border-color: #bbb; }
  .opt-btn.correct { background: #e6f4ea; border-color: #4caf50; color: #1a4a1e; }
  .opt-btn.wrong { background: #fdecea; border-color: #e57373; color: #5c1010; }
  .opt-btn.revealed { background: #e6f4ea; border-color: #4caf50; color: #1a4a1e; }
  .opt-btn:disabled { cursor: default; }

  /* Score / results */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: #888;
  }
  .score-display { font-size: 0.95rem; color: #1a1a1a; }

  .results-box {
    display: none;
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    padding: 1.5rem;
    text-align: center;
    margin-top: 1.5rem;
  }
  .results-score { font-size: 2rem; font-weight: bold; margin-bottom: 0.4rem; }
  .results-label { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
  .results-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .nav-btn {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.65rem 1.4rem;
    font-size: 0.9rem;
    font-family: Georgia, serif;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: #333; }
  .nav-btn.secondary {
    background: transparent;
    color: #1a1a1a;
    border: 1px solid #ccc;
  }
  .nav-btn.secondary:hover { background: #f0ede6; }
</style>
</head>
<body>
<div class="container">
  <a class="back-btn" href="index.html">← Home</a>
  <h1>Reading Exercises</h1>
  <p class="passage-label" id="passage-label"></p>

  <div class="passage-box" id="passage-box"></div>

  <div class="score-bar">
    <span class="questions-title">Questions</span>
    <span class="score-display" id="score-display"></span>
  </div>

  <div id="questions-area"></div>

  <div class="results-box" id="results-box">
    <div class="results-score" id="results-score"></div>
    <div class="results-label" id="results-label"></div>
    <div class="results-btns">
      <button class="nav-btn secondary" onclick="goHome()">← Home</button>
      <button class="nav-btn" onclick="nextPassage()">Next passage →</button>
    </div>
  </div>
</div>

<script>
const PASSAGES = [
  {
    id: "metro_conversation",
    title: "Разговор в метро",
    difficulty: "easy",
    intro: "А bumps into his fellow student Б, who has a companion В.",
    dialogue: [
      { speaker: "А", text: "Здравствуй, Ваня. Куда ты едешь?" },
      { speaker: "Б", text: "Домой, на улицу Волгина. А ты едешь в университет?" },
      { speaker: "А", text: "Нет, я тоже еду домой. Я теперь живу на улице Вавилова." },
      { speaker: "Б", text: "Познакомьтесь. Это моя подруга Мари, она англичанка." },
      { speaker: "В", text: "Здравствуйте, Миша." },
      { speaker: "А", text: "Простите, вас зовут Мэри?" },
      { speaker: "В", text: "Нет, Мари. Это французское имя. Но я не говорю по-французски." },
    ],
    questions: [
      {
        q: "What is the name of А?",
        opts: ["Ваня", "Миша", "Мари", "Борис"],
        a: 1
      },
      {
        q: "Where does А now live?",
        opts: ["улица Волгина", "улица Вавилова", "улица Пушкина", "улица Ленина"],
        a: 1
      },
      {
        q: "Where is Б going?",
        opts: ["To university", "To the shops", "Home", "To the metro"],
        a: 2
      },
      {
        q: "What nationality is В?",
        opts: ["French", "Russian", "American", "English"],
        a: 3
      },
      {
        q: "Which language does В say she does not speak?",
        opts: ["Russian", "English", "French", "German"],
        a: 2
      },
    ]
  },
  {
    id: "restaurant",
    title: "В ресторане",
    difficulty: "easy",
    intro: "Джон (Д), an Englishman visiting Moscow, sits down at a restaurant. Официантка (О) comes to take his order.",
    dialogue: [
      { speaker: "О", text: "Здравствуйте. Добрый день." },
      { speaker: "Д", text: "Здравствуйте. Простите, вы говорите по-английски?" },
      { speaker: "О", text: "Нет, я не говорю по-английски. Вы говорите по-русски?" },
      { speaker: "Д", text: "Да, немного. Где меню, пожалуйста?" },
      { speaker: "О", text: "Вот меню." },
      { speaker: "Д", text: "Спасибо. Это борщ?" },
      { speaker: "О", text: "Да, это борщ. Со сметаной." },
      { speaker: "Д", text: "Хорошо. Борщ, пожалуйста. И вино. Белое вино есть?" },
      { speaker: "О", text: "Да, есть. Пожалуйста." },
      { speaker: "Д", text: "Спасибо!" },
    ],
    questions: [
      {
        q: "What nationality is Джон?",
        opts: ["American", "French", "English", "Australian"],
        a: 2
      },
      {
        q: "Does the waitress speak English?",
        opts: ["Yes, a little", "Yes, very well", "No", "She doesn't say"],
        a: 2
      },
      {
        q: "What food does Джон order?",
        opts: ["Салат", "Борщ", "Шоколад", "Сметана"],
        a: 1
      },
      {
        q: "What does Джон ask about the dish before ordering?",
        opts: ["Whether it is fresh", "Whether it is expensive", "Whether it is borsch", "Whether it comes with bread"],
        a: 2
      },
      {
        q: "What does Джон drink with his meal?",
        opts: ["Чай", "Водка", "Пиво", "Вино"],
        a: 3
      },
    ]
  },
  {
    id: "hotel",
    title: "В гостинице",
    difficulty: "easy",
    intro: "Лука (Л), a Neapolitan visiting Moscow, arrives at his hotel. Администратор (А) is at the desk.",
    dialogue: [
      { speaker: "Л", text: "Здравствуйте. Меня зовут Лука. Я живу в Неаполе." },
      { speaker: "А", text: "Здравствуйте. Вы говорите по-русски?" },
      { speaker: "Л", text: "Да, немного. Я изучаю русский язык." },
      { speaker: "А", text: "Хорошо! Вы говорите по-русски очень хорошо." },
      { speaker: "Л", text: "Спасибо! Простите, где метро?" },
      { speaker: "А", text: "Метро? Вот. Прямо и направо." },
      { speaker: "Л", text: "А автобус тоже там?" },
      { speaker: "А", text: "Да, автобус и троллейбус." },
      { speaker: "Л", text: "Отлично. Спасибо!" },
      { speaker: "А", text: "Пожалуйста. До свидания!" },
    ],
    questions: [
      {
        q: "Where is Лука from?",
        opts: ["Rome", "Milan", "Naples", "Turin"],
        a: 2
      },
      {
        q: "Why does Лука speak some Russian?",
        opts: ["He has a Russian wife", "He is studying Russian", "He lived in Moscow", "He doesn't say"],
        a: 1
      },
      {
        q: "What does the administrator say about Лука's Russian?",
        opts: ["It needs improvement", "It is very good", "It is a little strange", "It is bad"],
        a: 1
      },
      {
        q: "What does Лука ask the administrator to help him find?",
        opts: ["A restaurant", "A taxi", "The metro", "The post office"],
        a: 2
      },
      {
        q: "How does the administrator direct Лука to the metro?",
        opts: ["Left and then straight on", "Straight on and turn right", "Right and then left", "Straight on and turn left"],
        a: 1
      },
    ]
  }
];

let passageIdx = 0;
let answered = [];
let correct = 0;

function loadPassage() {
  const p = PASSAGES[passageIdx];
  answered = new Array(p.questions.length).fill(false);
  correct = 0;

  // Label
  document.getElementById('passage-label').textContent =
    `Passage ${passageIdx + 1} of ${PASSAGES.length} — ${p.difficulty}`;

  // Passage box
  const box = document.getElementById('passage-box');
  let html = `<div class="passage-title">${p.title}</div>`;
  if (p.intro) html += `<div class="passage-intro">${p.intro}</div>`;
  for (const line of p.dialogue) {
    html += `<div class="dialogue-line"><span class="speaker">${line.speaker}:</span><span class="line-text">${line.text}</span></div>`;
  }
  box.innerHTML = html;

  // Score
  updateScore();

  // Questions
  const area = document.getElementById('questions-area');
  area.innerHTML = '';
  p.questions.forEach((q, qi) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q${qi}`;

    const qtext = document.createElement('div');
    qtext.className = 'question-text';
    qtext.textContent = `${qi + 1}. ${q.q}`;
    block.appendChild(qtext);

    const opts = document.createElement('div');
    opts.className = 'options';
    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = () => handleAnswer(qi, oi);
      opts.appendChild(btn);
    });
    block.appendChild(opts);
    area.appendChild(block);
  });

  document.getElementById('results-box').style.display = 'none';
}

function handleAnswer(qi, oi) {
  if (answered[qi]) return;
  answered[qi] = true;

  const p = PASSAGES[passageIdx];
  const q = p.questions[qi];
  const block = document.getElementById(`q${qi}`);
  const btns = block.querySelectorAll('.opt-btn');

  btns.forEach(b => b.disabled = true);

  if (oi === q.a) {
    btns[oi].classList.add('correct');
    correct++;
  } else {
    btns[oi].classList.add('wrong');
    btns[q.a].classList.add('revealed');
  }

  updateScore();

  if (answered.every(Boolean)) {
    setTimeout(showResults, 600);
  }
}

function updateScore() {
  const total = PASSAGES[passageIdx].questions.length;
  const done = answered.filter(Boolean).length;
  document.getElementById('score-display').textContent =
    done > 0 ? `${correct} / ${done} correct` : '';
}

function showResults() {
  const total = PASSAGES[passageIdx].questions.length;
  const box = document.getElementById('results-box');
  document.getElementById('results-score').textContent = `${correct} / ${total}`;
  const pct = Math.round((correct / total) * 100);
  let label = pct === 100 ? 'Perfect! 🎉' : pct >= 60 ? 'Good effort — review the answers above.' : 'Keep practising — the answers are highlighted above.';
  document.getElementById('results-label').textContent = label;
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextPassage() {
  passageIdx = (passageIdx + 1) % PASSAGES.length;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  loadPassage();
}

function goHome() {
  window.location.href = 'index.html';
}

loadPassage();
</script>
</body>
</html>
